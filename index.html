<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rajat Sharma - Design Engineer</title>
  <meta name="description" content="Portfolio of Rajat Sharma — Design Engineer specializing in Computer Architecture, RTL Design, VLSI, and Verification." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/fontawesome-all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────── -->
  <nav id="navbar">
    <div class="container nav-inner">
      <a href="#hero" class="nav-logo">RS<span class="dot">.</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="#about"      class="nav-link">About</a></li>
        <li><a href="#experience" class="nav-link">Experience</a></li>
        <li><a href="#projects"   class="nav-link">Projects</a></li>
        <li><a href="#education"  class="nav-link">Education</a></li>
        <li><a href="#contact"    class="nav-link">Contact</a></li>
      </ul>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ── Hero ───────────────────────────────────────────── -->
  <section id="hero">
    <div class="hero-glow hero-glow-1"></div>
    <div class="hero-glow hero-glow-2"></div>
    <div class="container hero-inner">
      <div class="hero-text">
        <span class="hero-eyebrow">Hello, I'm</span>
        <h1 class="hero-name" id="hero-name"></h1>
        <div class="hero-role">
          <span id="typed-text"></span><span class="cursor">|</span>
        </div>
        <p class="hero-bio" id="hero-bio"></p>
        <div class="hero-cta">
          <a href="#projects" class="btn btn-primary">View My Work</a>
          <a href="#contact"  class="btn btn-ghost">Get In Touch</a>
          <a id="resume-btn" href="RajatSharma_Resume.pdf" class="btn btn-outline" download target="_blank" rel="noopener"><i class="fas fa-file-pdf"></i> Resume</a>
        </div>
        <div class="hero-stats" id="hero-stats"></div>
      </div>
      <div class="hero-visual">
        <div class="hero-photo-wrap">
          <img id="hero-photo" src="" alt="" />
          <div class="photo-ring"></div>
        </div>
      </div>
    </div>
    <a href="#about" class="scroll-hint" aria-label="Scroll down">
      <div class="scroll-mouse"><div class="scroll-wheel"></div></div>
    </a>
  </section>

  <!-- ── About / Skills ────────────────────────────────── -->
  <section id="about">
    <div class="container">
      <h2 class="section-title reveal">Skills</h2>
      <div class="skills-grid" id="skills-grid"></div>
    </div>
  </section>

  <!-- ── Experience ────────────────────────────────────── -->
  <section id="experience">
    <div class="container">
      <h2 class="section-title reveal">Experience</h2>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>

  <!-- ── Projects ──────────────────────────────────────── -->
  <section id="projects">
    <div class="container">
      <h2 class="section-title reveal">Projects</h2>
      <div class="filter-tabs reveal" id="filter-tabs"></div>
      <div class="projects-grid" id="projects-grid"></div>
    </div>
  </section>

  <!-- ── Education ─────────────────────────────────────── -->
  <section id="education">
    <div class="container">
      <h2 class="section-title reveal">Education</h2>
      <div class="edu-grid" id="edu-grid"></div>
      <p class="subsection-label reveal">Certifications</p>
      <div class="cert-grid" id="cert-grid"></div>
    </div>
  </section>

  <!-- ── Contact ───────────────────────────────────────── -->
  <section id="contact">
    <div class="container">
      <h2 class="section-title reveal">Get In Touch</h2>
      <div class="contact-wrap">
        <div class="contact-info reveal" id="contact-info"></div>
        <form class="contact-form reveal reveal-delay-1" id="contact-form" novalidate>
          <div id="form-msg"></div>
          <div class="form-row">
            <div class="form-group">
              <label for="cf-name">Name</label>
              <input type="text" id="cf-name" name="name" placeholder="Your name" required />
            </div>
            <div class="form-group">
              <label for="cf-email">Email</label>
              <input type="email" id="cf-email" name="email" placeholder="your@email.com" required />
            </div>
          </div>
          <div class="form-group">
            <label for="cf-message">Message</label>
            <textarea id="cf-message" name="message" rows="5" placeholder="Your message…" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary" id="submit-btn">
            <i class="fas fa-paper-plane"></i> Send Message
          </button>
        </form>
      </div>
    </div>
  </section>

  <!-- ── Footer ────────────────────────────────────────── -->
  <footer id="footer">
    <div class="container footer-inner">
      <p class="footer-copy">&copy; <span id="footer-year"></span> Rajat Sharma. All rights reserved.</p>
      <ul class="footer-social" id="footer-social"></ul>
    </div>
  </footer>

  <script src="data/portfolio-data.js"></script>
  <script src="assets/js/portfolio.js"></script>
</body>
</html>
